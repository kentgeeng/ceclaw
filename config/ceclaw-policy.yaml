version: 1
egress:
  default: deny
  rules:
    ceclaw_router:
      name: ceclaw_router
      endpoints:
      - host: host.openshell.internal
        port: 8000
        access: full
    clawhub:
      endpoints:
      - host: clawhub.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
        - allow:
            method: '*'
            path: /**
    github:
      endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    npm:
      endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    pypi:
      endpoints:
      - host: pypi.org
        port: 443
        access: full
      - host: files.pythonhosted.org
        port: 443
        access: full
