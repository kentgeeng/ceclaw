version: 1
network_policies:
  ceclaw_router:
    endpoints:
      - host: host.openshell.internal
        port: 8000
        access: full
        allowed_ips:
          - 172.17.0.1
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/node
      - path: /usr/local/bin/openclaw
  external_web:
    endpoints:
      - host: "*.com"
        port: 443
      - host: "*.tw"
        port: 443
      - host: "*.net"
        port: 443
      - host: "*.org"
        port: 443
      - host: "*.io"
        port: 443
      - host: "*.in"
        port: 443
    binaries:
      - path: /usr/bin/node
      - path: /usr/local/bin/openclaw
      - path: /usr/bin/curl
