version: 1
network_policies:
  ceclaw_router:
    endpoints:
      - host: host.openshell.internal
        port: 8000
        allowed_ips:
          - 172.17.0.1
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/node
      - path: /usr/local/bin/openclaw
  external_web:
    endpoints:
      - host: "*.yahoo.com"
        port: 443
      - host: "*.google.com"
        port: 443
      - host: "*.twse.com.tw"
        port: 443
      - host: "*.tpex.org.tw"
        port: 443
      - host: "technews.tw"
        port: 443
      - host: "fonts.googleapis.com"
        port: 443
      - host: "fonts.gstatic.com"
        port: 443
      - host: "github.com"
        port: 443
      - host: "*.github.com"
        port: 443
      - host: "openweathermap.org"
        port: 443
      - host: "*.com"
        port: 443
      - host: "*.tw"
        port: 443
      - host: "*.net"
        port: 443
      - host: "*.org"
        port: 443
      - host: "*.io"
        port: 443
      - host: "*.in"
        port: 443
    binaries:
      - path: /usr/bin/git
      - path: /usr/bin/node
      - path: /usr/local/bin/openclaw
      - path: /usr/bin/curl
  ollama_local:
    endpoints:
      - host: "172.17.0.1"
        port: 11434
        allowed_ips:
          - 172.17.0.1
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/node
  gb10_llama:
    endpoints:
      - host: "192.168.1.91"
        port: 8001
        allowed_ips:
          - 192.168.1.91
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/node
  npm_registry:
    endpoints:
      - host: "registry.npmjs.org"
        port: 443
      - host: "*.npmjs.org"
        port: 443
    binaries:
      - path: /usr/bin/node
      - path: /usr/local/bin/npm
      - path: /usr/bin/npm
